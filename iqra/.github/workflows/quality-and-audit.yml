name: Quality checks & cargo-audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Kill lingering iqra.exe (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-Process iqra -ErrorAction SilentlyContinue | Stop-Process -Force; exit 0

      - name: Run rustfmt check
        run: |
          cargo fmt -- --check

      - name: Run clippy (deny warnings)
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Clean (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo clean

      - name: Run tests
        run: |
          cargo test --all

      - name: Run cargo-audit (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: RustSec/rustsec-action@v1
        with:
          format: json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
