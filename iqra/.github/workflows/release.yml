name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build and package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: |
          if [ "${{ matrix.target }}" != "x86_64-unknown-linux-gnu" ]; then rustup target add ${{ matrix.target }}; fi
          cargo build --release --target ${{ matrix.target }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $pkg = "iqra-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "release/$pkg" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/iqra.exe" "release/$pkg/iqra.exe"
          Copy-Item "README.md" "release/$pkg/README.md"
          Copy-Item "LICENSE" "release/$pkg/LICENSE"
          Compress-Archive -Path "release/$pkg/*" -DestinationPath "release/$pkg.zip"
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p release
          pkg="iqra-${{ matrix.target }}"
          mkdir -p "release/$pkg"
          cp target/${{ matrix.target }}/release/iqra "release/$pkg/iqra"
          cp README.md LICENSE "release/$pkg/"
          tar -czf "release/$pkg.tar.gz" -C release "$pkg"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iqra-${{ matrix.target }}
          path: release/*

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          pattern: iqra-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: |
            release/*.zip
            release/*.tar.gz
