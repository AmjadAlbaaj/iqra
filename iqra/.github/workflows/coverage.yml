name: Coverage
on:
  push:
    branches: [ main, chore/remove-global-executor ]
  pull_request:
    branches: [ main ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Install tarpaulin
        run: |
          cargo install cargo-tarpaulin --version 0.22.0 || true
      - name: Run coverage
        run: |
          cargo tarpaulin --out Xml || true
