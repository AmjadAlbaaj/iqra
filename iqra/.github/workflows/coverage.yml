name: Test coverage (Linux)

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ chore/remove-global-executor ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: Install tarpaulin
        run: |
          cargo install cargo-tarpaulin --version 0.30.0 || true
      - name: Run coverage
        run: |
          cargo tarpaulin --workspace --tests --out Xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cobertura.xml
